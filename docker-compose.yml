# ============================================================
# Quill - Docker Compose Configuration
# Runs the Express backend and Next.js frontend against MongoDB Atlas.
# Start with: docker compose up --build
# ============================================================

# Compose creates an isolated project network for the application containers.
# MongoDB Atlas is reached over TLS through the containers' outbound connection.
networks:
  quill-network:
    # The bridge driver keeps Quill services on a private Docker network.
    # Only ports explicitly listed under services.ports are exposed to the host.
    driver: bridge

# Named volumes persist important runtime data across container rebuilds.
volumes:
  backend-logs:
    # Backend logs persist outside the container filesystem for audit evidence.
    driver: local
  backend-uploads:
    # Uploaded avatars/files persist across backend image rebuilds.
    driver: local

services:
  backend:
    image: quill-backend
    build:
      # Build context is limited to the backend project.
      context: ./Quill_Backend
      dockerfile: Dockerfile
    container_name: quill-backend
    restart: unless-stopped
    networks:
      - quill-network
    ports:
      # Publish backend HTTPS from the container to the host.
      - "5000:5000"
    environment:
      # Production mode enables secure cookie flags and production-safe errors in the backend.
      NODE_ENV: ${NODE_ENV}
      PORT: 5000
      HOST: 0.0.0.0
      SERVER_HOST: localhost:5000
      # Atlas SRV connection string is supplied by the root .env file at runtime.
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      OTP_PEPPER: ${OTP_PEPPER}
      COOKIE_SECURE: ${COOKIE_SECURE}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      SERVER_URL: ${SERVER_URL}
      CLIENT_URL: ${CLIENT_URL}
      LOCAL_SERVER_URL: ${SERVER_URL}
      LOCAL_CLIENT_URL: ${CLIENT_URL}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
      OTP_EXPIRY_MINUTES: ${OTP_EXPIRY_MINUTES}
      # Backend-only secret verifies Google reCAPTCHA tokens; never expose this to browser code.
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY}
      # Public site key is also available to the runtime config endpoint so a
      # cloned frontend is not dependent only on build-time interpolation.
      NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${NEXT_PUBLIC_RECAPTCHA_SITE_KEY}
      RECAPTCHA_EXPECTED_HOSTNAME: ${RECAPTCHA_EXPECTED_HOSTNAME}
      RECAPTCHA_MIN_SCORE: ${RECAPTCHA_MIN_SCORE}
    volumes:
      # Mount TLS certs read-only so the HTTPS server can read but not alter keys.
      - ./Quill_Backend/certs:/app/certs:ro
      # Persist security/application logs for debugging and coursework evidence.
      - backend-logs:/app/logs
      # Persist uploaded profile images outside the container lifecycle.
      - backend-uploads:/app/uploads

  admin-seed:
    image: quill-backend
    build:
      # Reuse the backend image so the seed script runs against the same compiled models and validation rules.
      context: ./Quill_Backend
      dockerfile: Dockerfile
    container_name: quill-admin-seed
    profiles:
      # The tools profile keeps admin seeding manual; normal docker compose up will not run privileged setup.
      - tools
    restart: "no"
    networks:
      - quill-network
    command: ["npm", "run", "seed:admin:prod"]
    environment:
      NODE_ENV: ${NODE_ENV}
      # The seed command uses the same Atlas database as the backend.
      MONGO_URI: ${MONGO_URI}
      # Admin seed credentials are runtime-only secrets sourced from the local .env file.
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_FULL_NAME: ${ADMIN_FULL_NAME}

  frontend:
    build:
      # Build context is limited to the frontend project.
      context: ./Quill_Frontend
      dockerfile: Dockerfile
      args:
        # Next.js inlines NEXT_PUBLIC values during build for browser code.
        # Passing this arg keeps the browser bundle pointed at the host backend URL.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        # reCAPTCHA site key is public and must be available during Next.js build.
        NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${NEXT_PUBLIC_RECAPTCHA_SITE_KEY}
    container_name: quill-frontend
    restart: unless-stopped
    networks:
      - quill-network
    ports:
      # Publish the Next.js app to the host browser.
      - "3000:3000"
    depends_on:
      # Start the backend before the frontend container.
      - backend
    environment:
      # Keep the value available to the Next.js runtime server as well.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      # Public site key lets the browser render the Google reCAPTCHA widget.
      NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${NEXT_PUBLIC_RECAPTCHA_SITE_KEY}
    volumes:
      # Mount TLS certs read-only so the frontend is truly served over HTTPS.
      # This keeps Secure-cookie and CSRF testing aligned with the backend.
      - ./Quill_Frontend/certs:/app/certs:ro
