# ============================================================
# Quill - Docker Compose Configuration
# Runs MongoDB, the Express backend, and the Next.js frontend.
# Start with: docker compose up --build
# ============================================================

# Compose creates an isolated project network so services can talk by name.
# Example: the backend reaches MongoDB with host "mongo", not localhost.
networks:
  quill-network:
    # The bridge driver keeps Quill services on a private Docker network.
    # Only ports explicitly listed under services.ports are exposed to the host.
    driver: bridge

# Named volumes persist important runtime data across container rebuilds.
volumes:
  mongo-data:
    # MongoDB stores database files here so users/posts survive restarts.
    driver: local
  backend-logs:
    # Backend logs persist outside the container filesystem for audit evidence.
    driver: local
  backend-uploads:
    # Uploaded avatars/files persist across backend image rebuilds.
    driver: local

services:
  mongo:
    # Pin MongoDB to a major/minor version instead of using latest.
    # Pinning makes coursework demos reproducible and avoids surprise upgrades.
    image: mongo:7.0
    container_name: quill-mongo
    restart: unless-stopped
    networks:
      - quill-network
    volumes:
      # /data/db is MongoDB's data directory inside the official image.
      - mongo-data:/data/db
    environment:
      # Root credentials are read from the local .env file.
      # They are not hardcoded here because compose files are normally committed.
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS}
      MONGO_INITDB_DATABASE: quill
    # No ports are published for MongoDB.
    # Security reason: the database is reachable only inside quill-network.

  backend:
    build:
      # Build context is limited to the backend project.
      context: ./Quill_Backend
      dockerfile: Dockerfile
    container_name: quill-backend
    restart: unless-stopped
    networks:
      - quill-network
    ports:
      # Publish backend HTTPS from the container to the host.
      - "5000:5000"
    depends_on:
      # Start MongoDB before the backend.
      # The app still needs a valid MONGO_URI because depends_on is not a readiness check.
      - mongo
    environment:
      # Production mode enables secure cookie flags and production-safe errors in the backend.
      NODE_ENV: ${NODE_ENV}
      PORT: 5000
      HOST: 0.0.0.0
      SERVER_HOST: localhost:5000
      # Inside Docker, "mongo" is the MongoDB service hostname.
      # localhost would incorrectly point back at the backend container itself.
      MONGO_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASS}@mongo:27017/quill?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      SERVER_URL: ${SERVER_URL}
      CLIENT_URL: ${CLIENT_URL}
      LOCAL_SERVER_URL: ${SERVER_URL}
      LOCAL_CLIENT_URL: ${CLIENT_URL}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
      OTP_EXPIRY_MINUTES: ${OTP_EXPIRY_MINUTES}
    volumes:
      # Mount TLS certs read-only so the HTTPS server can read but not alter keys.
      - ./Quill_Backend/certs:/app/certs:ro
      # Persist security/application logs for debugging and coursework evidence.
      - backend-logs:/app/logs
      # Persist uploaded profile images outside the container lifecycle.
      - backend-uploads:/app/uploads

  frontend:
    build:
      # Build context is limited to the frontend project.
      context: ./Quill_Frontend
      dockerfile: Dockerfile
      args:
        # Next.js inlines NEXT_PUBLIC values during build for browser code.
        # Passing this arg keeps the browser bundle pointed at the host backend URL.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: quill-frontend
    restart: unless-stopped
    networks:
      - quill-network
    ports:
      # Publish the Next.js app to the host browser.
      - "3000:3000"
    depends_on:
      # Start the backend before the frontend container.
      - backend
    environment:
      # Keep the value available to the Next.js runtime server as well.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    volumes:
      # Mount TLS certs read-only so the frontend is truly served over HTTPS.
      # This keeps Secure-cookie and CSRF testing aligned with the backend.
      - ./Quill_Frontend/certs:/app/certs:ro
